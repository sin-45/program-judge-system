<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ level }}問題一覧 - My Online Judge</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f5f7; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .btn-back { background-color: #6c757d; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .problem-list { list-style: none; padding: 0; }
        .problem-list a { display: block; padding: 15px; background-color: #e3f2fd; color: #0056b3; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 18px; margin-bottom: 10px;}
        .problem-list a:hover { background-color: #bbdefb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>難易度 {{ level }} - 問題一覧</h1>
            <a href="/" class="btn-back">← 難易度選択に戻る</a>
        </div>
        
        {% if problems %}
            <ul class="problem-list">
                {% for p in problems %}
                    <li><a href="/problem/{{ p.problem_id }}">{{ p.problem_id }}：{{ p.title }}</a></li>
                {% endfor %}
            </ul>
        {% else %}
            <p>この難易度の問題はまだありません。</p>
        {% endif %}
    </div>
</body>
</html>
